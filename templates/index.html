<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astute4AI · Videos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .mono { font-family: ui-monospace, 'SF Mono', 'Fira Code', 'Courier New', monospace; }
    .jk  { color: #93c5fd; }
    .js  { color: #86efac; }
    .jn  { color: #fde68a; }
    .jb  { color: #f9a8d4; }
    .jnl { color: #6b7280; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:none} }
    .spin     { animation: spin 1s linear infinite; display:inline-block; }
    .pulse    { animation: pulse 2s ease-in-out infinite; }
    .fade-in  { animation: fadeIn .2s ease; }
    .slide-in { animation: slideIn .25s ease; }
    ::-webkit-scrollbar       { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#374151; border-radius:3px; }
    .term-step  { color:#93c5fd; font-weight:600; }
    .term-done  { color:#4ade80; }
    .term-error { color:#f87171; font-weight:600; }
    .term-warn  { color:#fbbf24; }
    .term-dim   { color:#4b5563; }
    .nav-active { background:#1e3a5f !important; color:#93c5fd !important; }
  </style>
</head>
<body class="bg-[#080810] text-gray-200 h-screen flex flex-col overflow-hidden">

<!-- Toasts -->
<div id="toasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

<!-- Confirm modal -->
<div id="confirm-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-sm fade-in">
    <h3 id="confirm-title" class="font-semibold text-sm mb-2"></h3>
    <p id="confirm-msg" class="text-xs text-gray-400 mb-5"></p>
    <div class="flex gap-2">
      <button onclick="confirmResolve(false)"
        class="flex-1 px-4 py-2 rounded-lg border border-gray-700 text-sm text-gray-400 hover:bg-gray-800 transition-colors">
        Cancelar
      </button>
      <button id="confirm-ok-btn" onclick="confirmResolve(true)"
        class="flex-1 px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium transition-colors">
        Confirmar
      </button>
    </div>
  </div>
</div>

<!-- Header -->
<header class="h-12 border-b border-gray-800 flex items-center px-5 gap-3 flex-shrink-0 bg-[#0b0b15]">
  <div class="w-6 h-6 bg-blue-600 rounded flex items-center justify-center text-white text-[10px] font-black select-none">A</div>
  <span class="font-semibold text-sm tracking-tight">Astute4AI <span class="text-gray-600 font-normal">/ Videos</span></span>
  <div class="ml-auto flex items-center gap-3">
    <span id="pipe-badge" class="hidden items-center gap-1.5 text-xs text-blue-400 pulse">
      <span class="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block"></span>
      Pipeline em execução
    </span>
    <span id="running-badge" class="hidden items-center gap-1.5 text-xs text-amber-400 pulse">
      <span class="w-1.5 h-1.5 rounded-full bg-amber-400 inline-block"></span>
      Gerando vídeo...
    </span>
    <span class="text-[11px] text-gray-700" id="ts"></span>
  </div>
</header>

<!-- Body -->
<div class="flex flex-1 overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-56 border-r border-gray-800 flex flex-col bg-[#0b0b15] flex-shrink-0 overflow-y-auto">

    <!-- Início -->
    <div class="px-2 pt-3 pb-1">
      <button id="nav-home" onclick="showDashboard()"
        class="nav-btn w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left text-xs text-gray-400 hover:bg-gray-800 hover:text-gray-200 transition-all">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Início
      </button>
    </div>

    <!-- Criar Vídeo -->
    <div class="px-4 pt-3 pb-1">
      <p class="text-[9px] font-bold uppercase tracking-widest text-gray-600">Criar Vídeo</p>
    </div>
    <div class="px-2 space-y-px">
      <button id="nav-pipeline" onclick="showPipeline()"
        class="nav-btn w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left text-xs text-gray-400 hover:bg-gray-800 hover:text-gray-200 transition-all">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <span class="flex-1">Pipeline</span>
        <span id="nav-pipeline-badge"></span>
      </button>
      <!-- Sub-itens etapas 1-7 -->
      <div id="steps-nav" class="pl-6 space-y-px border-l border-gray-800/60 ml-4"></div>

      <button id="nav-approval" onclick="selectStep(8)"
        class="nav-btn w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left text-xs text-gray-400 hover:bg-gray-800 hover:text-gray-200 transition-all">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="flex-1">Aprovar Roteiro</span>
        <span id="nav-approval-badge"></span>
      </button>

      <button id="nav-video" onclick="selectStep(9)"
        class="nav-btn w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left text-xs text-gray-400 hover:bg-gray-800 hover:text-gray-200 transition-all">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
        </svg>
        <span class="flex-1">Gerar Vídeo</span>
        <span id="nav-video-badge"></span>
      </button>
    </div>

    <!-- Sistema -->
    <div class="px-4 pt-4 pb-1 border-t border-gray-800 mt-3">
      <p class="text-[9px] font-bold uppercase tracking-widest text-gray-600">Sistema</p>
    </div>
    <div class="px-2 pb-2 space-y-px">
      <button id="nav-sources" onclick="showSources()"
        class="nav-btn w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left text-xs text-gray-400 hover:bg-gray-800 hover:text-gray-200 transition-all">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
        </svg>
        Fontes de Notícias
      </button>
      <button id="nav-settings" onclick="showSettings()"
        class="nav-btn w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left text-xs text-gray-400 hover:bg-gray-800 hover:text-gray-200 transition-all">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Configurações
      </button>
    </div>

    <!-- Novo Vídeo -->
    <div class="mt-auto p-3 border-t border-gray-800">
      <button onclick="showResetModal()"
        class="w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg text-xs font-medium
               bg-blue-900/20 border border-blue-800/40 text-blue-400
               hover:bg-blue-900/40 hover:border-blue-700 transition-all">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Novo Vídeo
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main" class="flex-1 overflow-y-auto"></main>
</div>

<!-- Reset Modal -->
<div id="reset-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-sm fade-in">
    <div class="flex items-start gap-3 mb-5">
      <div class="w-9 h-9 rounded-full bg-amber-900/40 border border-amber-800 flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <div>
        <h3 class="font-semibold text-sm">Criar Novo Vídeo</h3>
        <p class="text-xs text-gray-500 mt-1">Todos os arquivos gerados serão apagados e o pipeline reiniciado do zero.</p>
      </div>
    </div>
    <label class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 cursor-pointer mb-5 text-sm">
      <input type="checkbox" id="reset-keep-video" class="w-4 h-4 rounded accent-blue-600" />
      <span>Manter vídeo atual (<code class="mono text-[11px]">video_images.mp4</code>)</span>
    </label>
    <div class="flex gap-2">
      <button onclick="closeResetModal()"
        class="flex-1 px-4 py-2 rounded-lg border border-gray-700 text-sm text-gray-400 hover:bg-gray-800 transition-colors">
        Cancelar
      </button>
      <button onclick="confirmReset()"
        class="flex-1 px-4 py-2 rounded-lg bg-red-700 hover:bg-red-600 text-white text-sm font-medium transition-colors">
        Apagar e Reiniciar
      </button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let state      = { steps: [], running: false, approval: null, pipe_running: false };
let activeView = null;   // 'home' | 'pipeline' | 8 | 9 | 1..7 | 'sources' | 'settings'
let sseSource  = null;
let pipeSSE    = null;

// ─────────────────────────────────────────────────────────────────────────────
// Toast + Confirm helpers
// ─────────────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info', duration = 3500) {
  const colors = {
    info:    'bg-gray-800 border-gray-700 text-gray-200',
    success: 'bg-green-900/80 border-green-800 text-green-300',
    error:   'bg-red-900/80 border-red-800 text-red-300',
    warn:    'bg-amber-900/80 border-amber-800 text-amber-300',
  };
  const icons = {
    info:    'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z',
    success: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z',
    error:   'M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z',
    warn:    'M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z',
  };
  const el = document.createElement('div');
  el.className = `pointer-events-auto flex items-start gap-2.5 px-4 py-3 rounded-xl border text-sm shadow-xl slide-in max-w-xs ${colors[type]}`;
  el.innerHTML = `
    <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${icons[type]}"/>
    </svg>
    <span>${escHtml(msg)}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

let _confirmResolve = null;
function showConfirm(title, msg, okLabel = 'Confirmar', danger = false) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent   = msg;
    const okBtn = document.getElementById('confirm-ok-btn');
    okBtn.textContent = okLabel;
    okBtn.className = `flex-1 px-4 py-2 rounded-lg text-sm font-medium transition-colors ${danger ? 'bg-red-700 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-500 text-white'}`;
    document.getElementById('confirm-modal').classList.remove('hidden');
  });
}
function confirmResolve(val) {
  document.getElementById('confirm-modal').classList.add('hidden');
  if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
}
document.getElementById('confirm-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('confirm-modal')) confirmResolve(false);
});

// ─────────────────────────────────────────────────────────────────────────────
// Bootstrap
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  await loadStatus();
  showDashboard();
  setInterval(loadStatus, 4000);
}

async function loadStatus() {
  try {
    const r = await fetch('/api/status');
    state = await r.json();
    renderSidebar();
    document.getElementById('ts').textContent = new Date().toLocaleTimeString('pt-BR');
    const rb = document.getElementById('running-badge');
    const pb = document.getElementById('pipe-badge');
    if (state.running) { rb.classList.remove('hidden'); rb.classList.add('flex'); }
    else               { rb.classList.add('hidden');    rb.classList.remove('flex'); }
    if (state.pipe_running) { pb.classList.remove('hidden'); pb.classList.add('flex'); }
    else                    { pb.classList.add('hidden');    pb.classList.remove('flex'); }
    if (activeView === 9) updateVideoGenUI();
  } catch (_) {}
}

// ─────────────────────────────────────────────────────────────────────────────
// Sidebar
// ─────────────────────────────────────────────────────────────────────────────
function renderSidebar() {
  // Pipeline sub-items (steps 1-7)
  const pipeSteps = state.steps.filter(s => s.id >= 1 && s.id <= 7);
  document.getElementById('steps-nav').innerHTML = pipeSteps.map(s => {
    const isActive = activeView === s.id;
    let dot = 'bg-gray-700';
    if (s.done) dot = 'bg-green-500';
    else if (state.pipe_running) dot = 'bg-blue-400 pulse';
    return `<button onclick="selectStep(${s.id})"
      class="w-full flex items-center gap-2 px-2 py-1.5 rounded text-left text-[11px] transition-all
             ${isActive ? 'bg-blue-950/80 text-blue-300' : 'text-gray-600 hover:text-gray-300 hover:bg-gray-800/50'}">
      <span class="w-2 h-2 rounded-full flex-shrink-0 ${dot}"></span>
      <span class="truncate">${s.name}</span>
    </button>`;
  }).join('');

  // Approval badge
  const step4Done    = state.steps.find(s => s.id === 4)?.done;
  const approved     = state.approval?.decision === 'approved';
  const rejected     = state.approval?.decision === 'rejected';
  const videoDone    = state.steps.find(s => s.id === 9)?.done;
  const abadge       = document.getElementById('nav-approval-badge');
  if (approved) {
    abadge.className = 'text-[9px] px-1.5 py-0.5 rounded-full bg-green-900/50 text-green-400 border border-green-900';
    abadge.textContent = '✓';
  } else if (step4Done && !approved) {
    abadge.className = 'w-2 h-2 rounded-full bg-amber-400 pulse flex-shrink-0';
    abadge.textContent = '';
  } else {
    abadge.className = '';
    abadge.textContent = '';
  }

  // Video badge
  const vbadge = document.getElementById('nav-video-badge');
  if (videoDone) {
    vbadge.className = 'text-[9px] px-1.5 py-0.5 rounded-full bg-green-900/50 text-green-400 border border-green-900';
    vbadge.textContent = '✓';
  } else {
    vbadge.className = ''; vbadge.textContent = '';
  }

  // Pipeline badge
  const pipebadge = document.getElementById('nav-pipeline-badge');
  if (state.pipe_running) {
    pipebadge.className = 'w-2 h-2 rounded-full bg-blue-400 pulse flex-shrink-0';
    pipebadge.textContent = '';
  } else {
    pipebadge.className = ''; pipebadge.textContent = '';
  }

  // Active states
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('nav-active');
    b.classList.add('text-gray-400');
    b.classList.remove('text-blue-300');
  });
  const map = { home:'nav-home', pipeline:'nav-pipeline', 8:'nav-approval', 9:'nav-video', sources:'nav-sources', settings:'nav-settings' };
  const activeId = map[activeView];
  if (activeId) {
    const b = document.getElementById(activeId);
    if (b) { b.classList.add('nav-active'); b.classList.remove('text-gray-400'); }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Dashboard (Início)
// ─────────────────────────────────────────────────────────────────────────────
async function showDashboard() {
  activeView = 'home';
  renderSidebar();
  _renderDashboardShell();
  try {
    const r = await fetch('/api/pipeline/logs-snapshot');
    const d = await r.json();
    _renderDashboardLog(d.logs, d.running);
  } catch (_) {}
}

function _nextStep() {
  const pipeStepsDone = state.steps.filter(s => s.id >= 1 && s.id <= 7 && s.done).length;
  const step4Done  = state.steps.find(s => s.id === 4)?.done;
  const approved   = state.approval?.decision === 'approved';
  const videoDone  = state.steps.find(s => s.id === 9)?.done;

  if (state.pipe_running)
    return { label:'Pipeline em execução…', sub:'Acompanhe o progresso no terminal', color:'text-blue-400', bg:'bg-blue-900/15 border-blue-800/50', icon:'M13 10V3L4 14h7v7l9-11h-7z', action:'showPipeline()', btn:'Ver progresso' };
  if (state.running)
    return { label:'Gerando vídeo…', sub:'O vídeo está sendo processado', color:'text-amber-400', bg:'bg-amber-900/15 border-amber-800/50', icon:'M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z', action:'selectStep(9)', btn:'Ver progresso' };
  if (videoDone)
    return { label:'Vídeo pronto! 🎉', sub:'O vídeo foi gerado com sucesso', color:'text-green-400', bg:'bg-green-900/15 border-green-800/50', icon:'M5 13l4 4L19 7', action:'selectStep(9)', btn:'Ver vídeo' };
  if (step4Done && approved)
    return { label:'Pronto para gerar o vídeo', sub:'Roteiro aprovado · execute a etapa final', color:'text-purple-400', bg:'bg-purple-900/15 border-purple-800/50', icon:'M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z', action:'selectStep(9)', btn:'Gerar Vídeo' };
  if (step4Done && !approved)
    return { label:'Roteiro aguardando aprovação', sub:'Revise o script antes de continuar', color:'text-amber-400', bg:'bg-amber-900/15 border-amber-800/50', icon:'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z', action:'selectStep(8)', btn:'Revisar Roteiro' };
  if (pipeStepsDone > 0)
    return { label:`Pipeline em andamento (${pipeStepsDone}/7)`, sub:'Continue de onde parou ou reinicie', color:'text-blue-400', bg:'bg-blue-900/15 border-blue-800/50', icon:'M13 10V3L4 14h7v7l9-11h-7z', action:'showPipeline()', btn:'Continuar' };
  return { label:'Pronto para começar', sub:'Execute o pipeline para coletar notícias e gerar o roteiro', color:'text-blue-400', bg:'bg-blue-900/15 border-blue-800/50', icon:'M13 10V3L4 14h7v7l9-11h-7z', action:'showPipeline()', btn:'Iniciar Pipeline' };
}

function _renderDashboardShell() {
  const pipeSteps = state.steps.filter(s => s.id >= 1 && s.id <= 7);
  const approved  = state.approval?.decision === 'approved';
  const rejected  = state.approval?.decision === 'rejected';
  const videoDone = state.steps.find(s => s.id === 9)?.done;
  const step4Done = state.steps.find(s => s.id === 4)?.done;
  const n = _nextStep();

  document.getElementById('main').innerHTML = `
  <div class="max-w-3xl mx-auto p-6 fade-in">

    <div class="mb-6">
      <h1 class="text-xl font-bold">Início</h1>
      <p class="text-gray-500 text-xs mt-0.5">Visão geral do pipeline de geração de vídeo</p>
    </div>

    <!-- Próximo passo -->
    <div class="${n.bg} border rounded-xl p-5 mb-5 flex items-center gap-4">
      <div class="w-10 h-10 rounded-full bg-black/20 flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 ${n.color}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${n.icon}"/>

function _wfStep(num, label, done, active) {
  const cls = done   ? 'bg-green-700 border-green-600 text-white'
            : active ? 'bg-blue-900 border-blue-600 text-blue-300 pulse'
            :          'bg-gray-900 border-gray-700 text-gray-600';
  const icon = done
    ? `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>`
    : `<span class="text-[10px] font-bold">${num}</span>`;
  return `<div class="flex flex-col items-center gap-1.5 flex-shrink-0">
    <div class="w-9 h-9 rounded-full border-2 ${cls} flex items-center justify-center">${icon}</div>
    <span class="text-[10px] text-gray-500">${label}</span>
  </div>`;
}

function _statCard(label, value, cls) {
  return `<div class="bg-gray-900/50 border border-gray-800 rounded-xl px-4 py-3">
    <p class="text-[10px] text-gray-600 mb-1">${label}</p>
    <p class="text-base font-bold ${cls}">${value}</p>
  </div>`;
}

function _stepRow(s) {
  const running = state.pipe_running;
  const icon = s.done
    ? `<span class="w-5 h-5 rounded-full bg-green-700 flex items-center justify-center flex-shrink-0">
         <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg></span>`
    : running
    ? `<span class="w-5 h-5 rounded-full border-2 border-blue-500 border-t-transparent spin flex-shrink-0"></span>`
    : `<span class="w-5 h-5 rounded-full border border-gray-700 flex items-center justify-center flex-shrink-0 text-[10px] text-gray-600 font-bold">${s.id}</span>`;

  return `<div class="flex items-center gap-3 px-5 py-2.5 hover:bg-gray-800/30 transition-colors">
    ${icon}
    <button onclick="selectStep(${s.id})" class="flex-1 text-left min-w-0">
      <span class="text-sm ${s.done ? 'text-gray-200' : 'text-gray-500'}">${s.name}</span>
      <span class="ml-2 text-[9px] text-gray-700 mono">${s.output}</span>
    </button>

      ${s.done ? `<span class="text-[10px] text-green-700">✓</span>` : `<span class="text-[10px] text-gray-800">—</span>`}
      <button onclick="runFromStep(${s.id})" ${running ? 'disabled' : ''} title="Executar a partir daqui"
        class="flex items-center gap-1 px-2 py-1 rounded text-[10px] border
               ${running ? 'border-gray-800 text-gray-700 cursor-not-allowed'
                         : 'border-gray-700 text-gray-500 hover:border-blue-700 hover:text-blue-400'} transition-colors">
        <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>
        Re-run
      </button>
    </div>
  </div>`;

function _renderDashboardLog(logs, running) {
  const panel = document.getElementById('dash-log');
  if (!panel) return;
  if (!logs?.length) { panel.innerHTML = '<span class="text-gray-700">Nenhum log disponível. Execute o pipeline.</span>'; return; }
  panel.innerHTML = logs.map(line => {
    let cls = 'text-gray-400';
    if (line.startsWith('[STEP:'))                                          cls = 'term-step';
    else if (line.startsWith('[DONE:'))                                     cls = 'term-done';
    else if (line.startsWith('[ERROR:'))                                    cls = 'term-error';
    else if (line.includes('✅'))                                           cls = 'term-done font-semibold';
    else if (line.includes('✗') || /erro|error/i.test(line))               cls = 'term-error';
    else if (line.includes('⏸') || line.includes('[APPROVAL'))             cls = 'term-warn';
    else if (line.startsWith('==='))                                        cls = 'term-dim';
    return `<div class="${cls}">${escHtml(line)}</div>`;
  }).join('');
  if (running) panel.innerHTML += '<div class="term-warn mt-1">▸ executando…</div>';
  panel.scrollTop = panel.scrollHeight;
}

function toggleLog() {
  document.getElementById('log-panel')?.classList.toggle('hidden');
  document.getElementById('log-chevron')?.classList.toggle('rotate-180');
}

async function runFromStep(n) {
  if (state.pipe_running) return;
  const label = n === 1 ? 'Executar pipeline do zero' : `Executar a partir da etapa ${n}`;
  const ok = await showConfirm(label, 'Os logs anteriores serão substituídos. Continuar?');
  if (!ok) return;
  try {
    const r = await fetch(`/api/pipeline/run-from/${n}`, { method: 'POST' });
    if (!r.ok) { const e = await r.json(); toast(e.detail || 'Erro ao iniciar pipeline', 'error'); return; }
    toast('Pipeline iniciado!', 'success');
    await loadStatus();
    showPipeline();
  } catch (e) { toast('Erro: ' + e.message, 'error'); }
}

// Step selection
// ─────────────────────────────────────────────────────────────────────────────
async function selectStep(id) {
  activeView = id;
  renderSidebar();
  const step = state.steps.find(s => s.id === id);
  if (!step) return;
  if (id === 8) { renderApproval(); return; }
  if (id === 9) { renderVideoGen(); return; }
  if (!step.done) { renderNotReady(step); return; }
  document.getElementById('main').innerHTML = loadingView(step.name);
  try {
    const data = await fetch(`/api/output/${step.output}`).then(r => r.json());
    renderJsonStep(step, data);
  } catch (e) { renderError('Erro ao carregar: ' + e.message); }
}

  return `<span class="px-3 py-1 text-xs rounded-full bg-red-900/50 text-red-400 border border-red-900">✗ Rejeitado</span>`;
}

async function decide(decision) {
  const notes = document.getElementById('approval-notes')?.value || '';
  await fetch('/api/approve', {

    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ decision, notes }),

  await loadStatus();
  toast(decision === 'approved' ? 'Roteiro aprovado!' : 'Roteiro rejeitado.', decision === 'approved' ? 'success' : 'warn');
  renderApproval();
}

          Erro ao reproduzir.
          <a href="/outputs/video_images.mp4" target="_blank" class="text-blue-400 underline">Nova aba</a>
          ou <a href="/api/video/download" download class="text-blue-400 underline">Download</a>.
        </div>
      </div>
    </div>
  </div>`;

  if (state.running) connectSSE();
}

function updateVideoGenUI() {
  const btn    = document.getElementById('btn-run');
  const cancel = document.getElementById('btn-cancel');
  const status = document.getElementById('term-status');
  if (!btn) return;
  const approved = state.approval?.decision === 'approved';
  if (state.running) {
    btn.disabled = true;
    btn.className = btn.className.replace('bg-blue-600 hover:bg-blue-500 text-white', 'bg-gray-800 text-gray-600 cursor-not-allowed');
    cancel?.classList.remove('hidden');
    if (status) status.textContent = 'executando…';
  } else {
    btn.disabled = !approved;
    if (approved) btn.className = btn.className.replace('bg-gray-800 text-gray-600 cursor-not-allowed', 'bg-blue-600 hover:bg-blue-500 text-white');
    cancel?.classList.add('hidden');
    const done = state.steps.find(s => s.id === 9)?.done;
    if (status) status.textContent = done ? 'concluído' : 'aguardando';
    if (done) {
      const vid = document.getElementById('video-section');
      if (vid) {
        vid.classList.remove('hidden');
        const player = document.getElementById('video-player');
        if (player) {
          document.getElementById('video-error')?.classList.add('hidden');
          player.onerror = () => document.getElementById('video-error')?.classList.remove('hidden');
          player.src = `/api/video?t=${Date.now()}`;
          player.load();
        }
      }
    }
  }
}

async function startVideo() {
  try {
    const r = await fetch('/api/generate', { method: 'POST' });
    if (!r.ok) { const e = await r.json(); toast(e.detail || 'Erro ao iniciar', 'error'); return; }
    await loadStatus();
    updateVideoGenUI();
    connectSSE();
  } catch (e) { toast('Erro: ' + e.message, 'error'); }
}

async function cancelVideo() {
  await fetch('/api/cancel', { method: 'POST' });
  await loadStatus();
  updateVideoGenUI();
  if (sseSource) { sseSource.close(); sseSource = null; }
  toast('Geração cancelada.', 'warn');
}

function connectSSE() {
  if (sseSource) sseSource.close();
  sseSource = new EventSource('/api/logs');
  const term = document.getElementById('terminal');
  if (!term) { sseSource.close(); sseSource = null; return; }
  sseSource.onmessage = e => {
    const div = document.createElement('div');
    const txt = e.data;
    if (/erro|error|fail/i.test(txt))        div.className = 'term-error';
    else if (/✓|pronto|done|mp4/i.test(txt)) div.className = 'term-done';
    else if (/⚠|aviso|warning/i.test(txt))   div.className = 'term-warn';
    else                                      div.className = 'text-gray-400';
    div.textContent = txt;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
  };
  sseSource.addEventListener('done', () => {
    sseSource.close(); sseSource = null;
    loadStatus().then(updateVideoGenUI);
    const s = document.getElementById('term-status');
    if (s) s.textContent = 'concluído';
    toast('Vídeo gerado com sucesso! 🎬', 'success', 5000);
  });
  sseSource.onerror = () => { if (sseSource?.readyState === EventSource.CLOSED) sseSource = null; };
}

function _pipeCard(n) {
  const s   = state.steps.find(st => st.id === n);
  const cls = s?.done ? 'border-green-800/60 bg-green-900/10 text-green-400'
            : state.pipe_running ? 'border-blue-800/40 bg-blue-900/5 text-blue-400/70 pulse'
            : 'border-gray-800 text-gray-600';
  const icon = s?.done
    ? `<svg class="w-3.5 h-3.5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>`
    : `<span class="text-[10px] font-bold">${n}</span>`;
  return `<button onclick="selectStep(${n})" class="border ${cls} rounded-lg p-2.5 text-center hover:border-blue-700/60 transition-colors">
    <div class="flex items-center justify-center mb-1">${icon}</div>
    <p class="text-[10px] truncate">${s?.name || ''}</p>
  </button>`;
}

async function pipeRun() {
  const r = await fetch('/api/pipeline/run', { method: 'POST' });
  if (!r.ok) { const d = await r.json(); toast(d.detail, 'error'); return; }
  await loadStatus(); renderPipeline(); connectPipeSSE();
}

async function pipeFinish() {
  const r = await fetch('/api/pipeline/finish', { method: 'POST' });
  if (!r.ok) { const d = await r.json(); toast(d.detail, 'error'); return; }
  await loadStatus(); renderPipeline(); connectPipeSSE();
}

async function pipeCancel() {
  await fetch('/api/pipeline/cancel', { method: 'POST' });
  if (pipeSSE) { pipeSSE.close(); pipeSSE = null; }
  await loadStatus(); renderPipeline();
  toast('Pipeline cancelado.', 'warn');
}

function connectPipeSSE() {
  if (pipeSSE) pipeSSE.close();
  pipeSSE = new EventSource('/api/pipeline/logs');
  const term = document.getElementById('pipe-terminal');
  if (term) term.innerHTML = '';

  pipeSSE.onmessage = e => {
    const t = document.getElementById('pipe-terminal');
    if (!t) return;
    if (t.children.length === 1 && t.children[0].textContent === 'Aguardando execução…') t.innerHTML = '';
    const div = document.createElement('div');
    const txt = e.data;
    if (/\[ERROR:/i.test(txt))          div.className = 'term-error';
    else if (/\[DONE:|✓|✅/i.test(txt)) div.className = 'term-done';
    else if (/\[STEP:/i.test(txt))      div.className = 'term-step';
    else if (/\[APPROVAL/i.test(txt))   div.className = 'term-warn';
    else                                div.className = 'text-gray-400';
    div.textContent = txt;
    t.appendChild(div); t.scrollTop = t.scrollHeight;
  };

  pipeSSE.addEventListener('done', async () => {
    pipeSSE.close(); pipeSSE = null;
    await loadStatus(); renderPipeline();
    const s = document.getElementById('pipe-term-status');
    if (s) s.textContent = 'concluído';
    const step4 = state.steps.find(st => st.id === 4)?.done;
    const step5 = state.steps.find(st => st.id === 5)?.done;
    if (step4 && !step5) toast('Etapas 1–4 concluídas! Revise e aprove o roteiro.', 'warn', 6000);
    else toast('Pipeline concluído!', 'success');
  });

  pipeSSE.onerror = () => { if (pipeSSE?.readyState === EventSource.CLOSED) pipeSSE = null; };
}

async function testSource(i) {
  const src = sourcesData[i];
  const btn = document.getElementById(`test-btn-${i}`);
  const res = document.getElementById(`test-result-${i}`);
  if (!btn || !res) return;
  btn.disabled = true; btn.textContent = '…';
  res.className = 'mt-1 text-xs'; res.textContent = 'Testando…'; res.classList.remove('hidden');
  try {
    const d = await fetch('/api/sources/test', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ url: src.feed_url || src.url }),
    }).then(r => r.json());
    if (d.ok) { res.className = 'mt-1 text-xs text-green-400'; res.textContent = `✓ Online (HTTP ${d.status})`; }
    else       { res.className = 'mt-1 text-xs text-red-400';   res.textContent = d.error ? `✗ ${d.error}` : `✗ HTTP ${d.status}`; }
  } catch (e) { res.className = 'mt-1 text-xs text-red-400'; res.textContent = `✗ ${e.message}`; }
  btn.disabled = false; btn.textContent = 'Testar';
}

function toggleSource(i) { sourcesData[i].enabled = !sourcesData[i].enabled; saveSources().then(renderSourcesList); }
async function deleteSource(i) {
  const ok = await showConfirm('Remover fonte', `Remover "${sourcesData[i].name}"?`, 'Remover', true);
  if (!ok) return;
  sourcesData.splice(i, 1); await saveSources(); renderSourcesList();
}
function addSourceRow()    { document.getElementById('add-form')?.classList.remove('hidden'); }
function cancelAddSource() { document.getElementById('add-form')?.classList.add('hidden'); }
async function saveNewSource() {
  const name = document.getElementById('new-name')?.value.trim();
  const url  = document.getElementById('new-url')?.value.trim();
  const type = document.getElementById('new-type')?.value || 'rss';
  if (!name || !url) { toast('Preencha nome e URL.', 'warn'); return; }
  sourcesData.push({ name, url, feed_url: url, type, country:'BR', language:'pt-BR', enabled: true });
  await saveSources(); cancelAddSource(); renderSourcesList();
  document.getElementById('new-name').value = '';
  document.getElementById('new-url').value  = '';
  toast(`Fonte "${name}" adicionada.`, 'success');
}
async function saveSources() {
  await fetch('/api/sources', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ sources: sourcesData }) });
}

// ─────────────────────────────────────────────────────────────────────────────
// JSON syntax highlighting
// ─────────────────────────────────────────────────────────────────────────────
function syntaxHighlight(obj, depth = 0) {
  if (obj === null)             return `<span class="jnl">null</span>`;
  if (typeof obj === 'boolean') return `<span class="jb">${obj}</span>`;
  if (typeof obj === 'number')  return `<span class="jn">${obj}</span>`;
  if (typeof obj === 'string')  return `<span class="js">"${escHtml(obj)}"</span>`;
  const pad = '  '.repeat(depth + 1), cpad = '  '.repeat(depth);
  if (Array.isArray(obj)) {
    if (!obj.length) return '[]';
    return `[\n${obj.map(v => pad + syntaxHighlight(v, depth+1)).join(',\n')}\n${cpad}]`;
  }
  const keys = Object.keys(obj);
  if (!keys.length) return '{}';
  return `{\n${keys.map(k => `${pad}<span class="jk">"${escHtml(k)}"</span>: ${syntaxHighlight(obj[k], depth+1)}`).join(',\n')}\n${cpad}}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function loadingView(t) {
  return `<div class="p-6 flex items-center gap-3 text-gray-500 fade-in">
    <span class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full spin"></span>
    <span class="text-sm">${t}…</span></div>`;
}
function renderError(msg) {
  document.getElementById('main').innerHTML = `<div class="p-6"><div class="bg-red-950/30 border border-red-900 rounded-xl p-5 text-red-400 text-sm">${msg}</div></div>`;
}

// Start
init();
